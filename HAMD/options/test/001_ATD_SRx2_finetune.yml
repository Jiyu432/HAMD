# network structures
network_g:
                                  type: TSSA_Net
                                  upscale: 2
                                  in_chans: 3
                                  img_size: 64
                                  window_size: 16
                                  compress_ratio: 24
                                  squeeze_factor: 24
                                  conv_scale: 0.01
                                  overlap_ratio: 0.5
                                  img_range: 1.
                                  depths: [6, 6, 6, 6, 6, 6]
                                  embed_dim: 144
                                  num_heads: [6, 6, 6, 6, 6, 6]
                                  mlp_ratio: 2
                                  upsampler: 'pixelshuffle'
                                  resi_connection: '1conv'


  
# path
path:
  pretrain_network_g: /tmp/pycharm_project_ATD2/experiments/train_TSSA_EAAI2025_SRx2_DIV2K_archived_20250802_141653/models/net_g_latest.pth
  strict_load_g: yes
  param_key_g: params_ema

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: yes
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: yes
